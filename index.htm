<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>


    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="container mt-5">

    <h1>EXPENSE TRACKER</h1>

    <form>
        <div class="form-group">
            <label for="ch=ex">TODAY COST EXPENSIVE</label>
            <input type="text" class="form-control" id="ch=ex" required>
        </div>

        <div class="form-group">
            <label for="ch-dec">CHOOSE DESCRIPTION</label>
            <input type="text" class="form-control" id="ch-dec" required>
        </div>

        <div class="form-group">
            <label for="ch-c">CHOOSE CATEGORY</label>
            <input type="text" class="form-control" id="ch-c" required>
        </div>

        <button type="button" class="btn btn-primary" id="add">ADD EXPENSE</button>
    </form>

    <script src="practice.js"></script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
